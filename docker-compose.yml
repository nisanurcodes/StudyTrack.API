services:

  # ── Redis Cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: studytrack-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REST API (ASP.NET Core 8 + SQLite) ──────────────────────────────────────
  backend:
    build:
      context: ./Study.API
      dockerfile: Dockerfile
    container_name: studytrack-api
    ports:
      - "10000:10000"           # http://localhost:10000/swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:10000
      # SQLite DB'yi kalıcı volume'a taşı
      - ConnectionStrings__DefaultConnection=Data Source=/data/study.db
      # Redis bağlantısı (container adı üzerinden erişim)
      - ConnectionStrings__Redis=redis:6379
    volumes:
      - studydb:/data           # DB verisi container yeniden başlayınca korunur
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ── Web Frontend (React + Vite → nginx) ────────────────────────────────────
  frontend:
    build:
      context: ./study-frontend
      dockerfile: Dockerfile
      args:
        # Tarayıcı bu URL'i kullanır; 127.0.0.1 = host makinenin backend portu
        - VITE_API_URL=http://127.0.0.1:10000/api
    container_name: studytrack-frontend
    ports:
      - "3000:80"               # http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  studydb:                      # SQLite dosyası için kalıcı Docker volume
