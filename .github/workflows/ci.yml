name: StudyTrack CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. ASP.NET Core Backend ────────────────────────────────────────────────
  build-backend:
    name: Backend — dotnet build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Study.API/Study.API.csproj

      - name: Build (Release)
        run: dotnet build Study.API/Study.API.csproj --configuration Release --no-restore

  # ── 2. React + Vite Frontend ──────────────────────────────────────────────
  build-frontend:
    name: Frontend — npm build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: study-frontend/package-lock.json

      - name: Install dependencies
        working-directory: study-frontend
        run: npm ci

      - name: Build
        working-directory: study-frontend
        run: npm run build

  # ── 3. Docker Compose Validation ─────────────────────────────────────────
  docker-check:
    name: Docker — compose config & build
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build
